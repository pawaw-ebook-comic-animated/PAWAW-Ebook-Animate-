<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAWAW — Le Grimoire Vivant Primitif</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&family=Amiri:ital@0;1&family=Noto+Sans+Hebrew:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#D4A017;--gold-l:#FFD700;--gold-g:#FFC200;
  --lr:#8B1A1A;--ld:#3D0000;--lm:#6B1212;
  --blk:#050505;
  --cuir-fonce: #1a0f08;
  --cuir-reflet: #2a1610;
  --parchemin-base: #e8d4a8;
  --parchemin-ombre: #c8a87a;
  --sang-seche: #5c1a06;
  --or-antique: #b8860b;
}
html,body{width:100%;height:100%;background:#000;overflow-x:hidden;font-family:'Cinzel',serif}

/* LANDING */
#landing{position:fixed;inset:0;background:#000;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1.2s ease}
#landing.hidden{opacity:0;pointer-events:none}
#wc{position:absolute;inset:0;width:100%;height:100%}
.lc{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:.9rem;text-align:center;padding:2rem}
.rune{font-family:'UnifrakturMaguntia',cursive;font-size:clamp(.9rem,2.5vw,1.6rem);color:var(--gold);opacity:.4;letter-spacing:.5em;animation:rf 4s ease-in-out infinite}
#lt{font-family:'UnifrakturMaguntia',cursive;font-size:clamp(3.5rem,9vw,8rem);color:var(--gold-l);text-shadow:0 0 10px var(--gold-g),0 0 40px var(--gold),0 0 80px rgba(212,160,23,.4),3px 3px 0 #000;line-height:1;animation:tp 3s ease-in-out infinite}
#ls{font-family:'Cinzel Decorative',cursive;font-size:clamp(.6rem,1.8vw,1.1rem);color:var(--gold);letter-spacing:.4em;text-transform:uppercase;text-shadow:0 0 15px var(--gold-g);opacity:.85}
.div{width:min(400px,80vw);height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.tag{font-family:'IM Fell English',serif;font-style:italic;color:var(--parchemin-ombre);font-size:clamp(.8rem,2vw,1rem);opacity:.75;max-width:480px;line-height:1.6}
#ob{background:linear-gradient(135deg,var(--lr),var(--ld));border:2px solid var(--gold);color:var(--gold-l);font-family:'Cinzel Decorative',cursive;font-size:clamp(.8rem,2vw,1.1rem);letter-spacing:.25em;padding:1rem 3rem;cursor:pointer;position:relative;overflow:hidden;text-shadow:0 0 10px var(--gold-g);box-shadow:0 0 25px rgba(212,160,23,.3),inset 0 0 20px rgba(0,0,0,.5);transition:all .3s;clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%)}
#ob:hover{box-shadow:0 0 40px rgba(212,160,23,.6),inset 0 0 30px rgba(212,160,23,.1);transform:scale(1.04)}

/* BOOK WORLD */
#bw{position:fixed;inset:0;background:#050505;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 1.2s ease;z-index:100}
#bw.active{opacity:1;pointer-events:all}
#bgc{position:absolute;inset:0;width:100%;height:100%;opacity:.2}

/* GRIMOIRE PRIMITIF (REMPLACE #bc / #book) */
#bc{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;width:100%;flex:1;min-height:0;padding:2rem}
.grimoire-container{
  position: relative;
  width: min(960px,95vw);
  height: min(650px,82vh);
  background: 
    linear-gradient(45deg, rgba(0,0,0,0.8), transparent),
    repeating-radial-gradient(circle at 50% 50%, var(--cuir-fonce) 0%, var(--cuir-reflet) 2px, var(--cuir-fonce) 4px);
  border-radius: 12px 18px 18px 12px;
  box-shadow: 
    inset 15px 0 30px rgba(0,0,0,0.9),
    inset -5px 0 15px rgba(0,0,0,0.7),
    0 25px 50px rgba(0,0,0,0.9);
  padding: 25px 20px 25px 45px;
  display: flex;
}
.grimoire-container::before {
  content: '';
  position: absolute;
  left: 15px;
  top: 3%;
  bottom: 3%;
  width: 4px;
  background: repeating-linear-gradient(0deg, transparent, transparent 15px, var(--or-antique) 15px, var(--or-antique) 18px);
  opacity: 0.5;
  z-index: 20;
}

/* PARCHEMINS */
.parchemin-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
  z-index: 2;
  display:flex;
}
.parchemin-wrapper::before,
.parchemin-wrapper::after {
  content: '';
  position: absolute;
  background: var(--parchemin-ombre);
  border: 1px solid rgba(92, 26, 6, 0.3);
  filter: url(#torn-edges);
  transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.5s ease;
}
.parchemin-wrapper::before {
  inset: -5px -8px -5px 5px;
  transform: rotate(1.2deg);
  z-index: -2;
  background: #d3be94;
  box-shadow: 2px 2px 10px rgba(0,0,0,0.6);
}
.parchemin-wrapper::after {
  inset: -2px 4px -6px -2px;
  transform: rotate(-0.8deg);
  z-index: -1;
  background: #deb887;
  box-shadow: -2px 5px 12px rgba(0,0,0,0.5);
}

.grimoire-container:hover .parchemin-wrapper::before {
  transform: rotate(2.5deg) translate(-2px, -3px);
  box-shadow: 4px 6px 18px rgba(0,0,0,0.8);
}
.grimoire-container:hover .parchemin-wrapper::after {
  transform: rotate(-1.5deg) translate(2px, 4px);
  box-shadow: -5px 10px 20px rgba(0,0,0,0.7);
}
.grimoire-container:hover .page {
  animation: fremissement-pawaw 1.5s infinite alternate ease-in-out;
  box-shadow: inset 0 0 20px rgba(184, 134, 11, 0.15), 0 0 15px rgba(92, 26, 6, 0.3); 
}

@keyframes fremissement-pawaw {
  0% { transform: scale(1) rotate(0deg); }
  25% { transform: scale(1.002) rotate(0.1deg); }
  50% { transform: scale(1) rotate(-0.05deg); }
  75% { transform: scale(1.003) rotate(0.15deg); }
  100% { transform: scale(1) rotate(0deg); }
}

/* PAGES INTÉRIEURES */
#pages{flex:1;position:relative;overflow:hidden;}
.page{
  position:absolute;
  inset:0;
  background: linear-gradient(135deg, var(--parchemin-base), #f5e6c8);
  filter: url(#torn-edges);
  display:flex;
  flex-direction:column;
  border: 4px solid transparent;
  border-image: repeating-linear-gradient(45deg, var(--sang-seche), var(--sang-seche) 10px, var(--cuir-fonce) 10px, var(--cuir-fonce) 20px) 10;
  opacity:0;
  pointer-events:none;
  transform-origin:left center;
  transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.5s ease;
}
.page.active{opacity:1;pointer-events:all;z-index:5;}
.page.fo{animation:fo .55s cubic-bezier(.4,0,.2,1) forwards}
.page.fi{animation:fi .55s cubic-bezier(.4,0,.2,1) forwards}
.page.fbo{animation:fbo .55s cubic-bezier(.4,0,.2,1) forwards}
.page.fbi{animation:fbi .55s cubic-bezier(.4,0,.2,1) forwards}
@keyframes fo{0%{opacity:1;transform:perspective(1200px) rotateY(0)}50%{opacity:.4;transform:perspective(1200px) rotateY(-88deg)}100%{opacity:0;transform:perspective(1200px) rotateY(-88deg)}}
@keyframes fi{0%{opacity:0;transform:perspective(1200px) rotateY(88deg)}50%{opacity:.4;transform:perspective(1200px) rotateY(88deg)}100%{opacity:1;transform:perspective(1200px) rotateY(0)}}
@keyframes fbo{0%{opacity:1;transform:perspective(1200px) rotateY(0)}100%{opacity:0;transform:perspective(1200px) rotateY(88deg)}}
@keyframes fbi{0%{opacity:0;transform:perspective(1200px) rotateY(-88deg)}100%{opacity:1;transform:perspective(1200px) rotateY(0)}}

/* FILIGRANE LANGUES ANCIENNES */
.filigrane-langues {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.06;
  font-size: 2.5rem;
  line-height: 1.2;
  overflow: hidden;
  color: var(--sang-seche);
  display: grid;
  grid-template-columns: 1fr 1fr;
  transform: rotate(-5deg) scale(1.2);
  z-index:0;
}

/* HEADER / FOOTER */
.ph,.pf{background:rgba(26,15,8,.85);color:var(--parchemin-base);font-family:'IM Fell English',serif;font-size:clamp(.55rem,1.1vw,.78rem);line-height:1.5;padding:.45rem 1rem;z-index:5;flex-shrink:0;font-style:italic;text-align:center;position:relative;border:1px solid rgba(184,134,11,.3)}
.ph::before,.pf::before{content:'❧ ';color:var(--or-antique);opacity:.8}
.ph::after,.pf::after{content:' ❧';color:var(--or-antique);opacity:.8}

/* CASES */
.ca{flex:1;padding:.55rem;display:flex;flex-direction:column;gap:.45rem;position:relative;z-index:2;overflow:hidden;min-height:0}
.cr{display:flex;gap:.45rem;flex:1;min-height:0}
.case{flex:1;position:relative;background:#1a1008;border:2px solid rgba(184,134,11,.45);border-radius:2px;overflow:hidden;cursor:zoom-in;transition:border-color .25s,box-shadow .25s;min-height:0}
.case:hover{border-color:var(--gold-l);box-shadow:0 0 18px rgba(212,160,23,.45),inset 0 0 8px rgba(212,160,23,.06)}
.case img,.case video{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.case:hover img,.case:hover video{transform:scale(1.03)}
.cl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.88));color:var(--or-antique);font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.1em;padding:.35rem .5rem .25rem;text-align:center;pointer-events:none;z-index:5}

/* BULLES DE DIALOGUE */
.bub{
  position:absolute;
  background:rgba(252,244,225,.92);
  border:2px solid #1a0f08;
  border-radius:14px;
  font-family:'IM Fell English',serif;
  font-size:clamp(.58rem,1.15vw,.78rem);
  line-height:1.55;
  padding:.5rem .7rem .45rem;
  max-width:62%;
  min-width:120px;
  max-height:48%;
  overflow-y:auto;
  overflow-x:hidden;
  z-index:8;
  pointer-events:none;
  box-shadow:3px 3px 10px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.3);
  scrollbar-width:thin;
  scrollbar-color:rgba(92,26,6,.5) transparent;
}
.bub::-webkit-scrollbar{width:3px}
.bub::-webkit-scrollbar-track{background:transparent}
.bub::-webkit-scrollbar-thumb{background:rgba(92,26,6,.5);border-radius:2px}
.bub::after{content:'';position:absolute;border:7px solid transparent;pointer-events:none;}
.bub.bl::after{bottom:-15px;left:14px;border-top-color:#1a0f08}
.bub.br::after{bottom:-15px;right:14px;border-top-color:#1a0f08}
.bub.tl::after{top:-15px;left:14px;border-bottom-color:#1a0f08}
.bub.tr::after{top:-15px;right:14px;border-bottom-color:#1a0f08}
.bub.bl::before,.bub.br::before,.bub.tl::before,.bub.tr::before{content:'';position:absolute;border:6px solid transparent;pointer-events:none;}
.bub.bl::before{bottom:-12px;left:15px;border-top-color:rgba(252,244,225,.92)}
.bub.br::before{bottom:-12px;right:15px;border-top-color:rgba(252,244,225,.92)}
.bub.tl::before{top:-12px;left:15px;border-bottom-color:rgba(252,244,225,.92)}
.bub.tr::before{top:-12px;right:15px;border-bottom-color:rgba(252,244,225,.92)}
.bi{font-style:italic;color:#0d0d0d;display:block}
.bname{font-family:'Cinzel',serif;font-size:.6em;letter-spacing:.1em;color:var(--sang-seche);font-weight:600;display:block;margin-bottom:.2rem;text-transform:uppercase}

/* NAV */
#nav{position:relative;z-index:20;display:flex;align-items:center;gap:1rem;padding:.5rem 1rem;background:rgba(26,15,8,.85);border:1px solid rgba(184,134,11,.3);border-radius:3px;flex-shrink:0;margin-bottom:.4rem}
.nb{background:linear-gradient(135deg,var(--ld),var(--sang-seche));border:1px solid var(--or-antique);color:var(--gold-l);font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.12em;padding:.45rem 1.3rem;cursor:pointer;transition:all .3s;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%)}
.nb:hover{background:linear-gradient(135deg,var(--sang-seche),#a02020);box-shadow:0 0 18px rgba(184,134,11,.4)}
.nb:disabled{opacity:.3;cursor:not-allowed}
#pi{color:var(--or-antique);font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.18em;min-width:110px;text-align:center;text-shadow:0 0 8px rgba(184,134,11,.5)}
#ct{color:var(--parchemin-ombre);font-family:'IM Fell English',serif;font-size:.68rem;font-style:italic;opacity:.75;text-align:center;max-width:240px;line-height:1.3}

/* LIGHTBOX (Identique à l'original, préservé intact) */
#lb{position:fixed;inset:0;background:#000;z-index:2000;display:none;flex-direction:column;align-items:stretch;font-family:'Cinzel',serif;}
#lb.open{display:flex}
#lb-top{flex-shrink:0;background:linear-gradient(180deg,#000 80%,rgba(0,0,0,.85));border-bottom:1px solid rgba(212,160,23,.35);padding:.65rem 1.4rem .55rem;display:flex;align-items:flex-start;gap:1rem;position:relative;}
#lb-top-narr{flex:1;color:var(--parchemin-base);font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(.68rem,1.55vw,.92rem);line-height:1.7;text-align:center;}
.lb-top-label{position:absolute;top:.5rem;left:.8rem;color:var(--gold);font-size:.6rem;letter-spacing:.18em;}
.lb-top-counter{position:absolute;top:.5rem;right:.8rem;color:var(--gold);font-size:.6rem;letter-spacing:.15em;}
#lb-mid{flex:1;min-height:0;position:relative;display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden;}
#lb-mid img{max-width:100%;max-height:100%;object-fit:contain;display:none;}
#lb-mid img.vis{display:block}
#lb-vid-wrap{position:relative;width:100%;height:100%;display:none;align-items:center;justify

             
  </style>
</body
</html>
